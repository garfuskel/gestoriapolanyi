<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoLingo</title>
  <style>
    body {
      font-family: 'Nunito', 'Segoe UI', sans-serif;
      background-color: #ffffff;
      color: #3c3c3c;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 0;
      height: 100vh;
      box-sizing: border-box;
    }
    
    #game-wrapper {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    /* Capçalera (Sense la flama) */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 30px;
      gap: 15px;
    }
    .stats-group { display: flex; gap: 15px; }
    .lives { color: #ff4b4b; font-weight: bold; font-size: 1.2rem; display: flex; align-items: center; gap: 5px; }
    
    .progress-bar-container { flex-grow: 1; background-color: #e5e5e5; height: 16px; border-radius: 10px; overflow: hidden; }
    .progress-bar-fill { background-color: #58cc02; height: 100%; width: 0%; border-radius: 10px; transition: width 0.3s ease; }

    /* Àrea de la Pregunta */
    #question-area { flex-grow: 1; display: flex; flex-direction: column; }
    
    .question-instruction {
      font-size: 1.1rem;
      font-weight: bold;
      color: #afafaf;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .question-content {
      font-size: 1.4rem;
      font-weight: 800;
      margin-bottom: 25px;
      color: #3c3c3c;
      line-height: 1.4;
    }
    
    /* Opcions */
    .options { display: flex; flex-direction: column; gap: 12px; }
    .option-btn {
      background: #ffffff; border: 2px solid #e5e5e5; border-radius: 15px; padding: 18px;
      font-size: 1.1rem; font-weight: bold; cursor: pointer; text-align: left;
      transition: all 0.1s ease; color: #4b4b4b; box-shadow: 0 4px 0 rgba(0,0,0,0.05);
    }
    .option-btn:hover { background: #f7f7f7; }
    .option-btn.selected { background: #ddf4ff; border-color: #1cb0f6; color: #1899d6; box-shadow: 0 4px 0 #1899d6; }
    .option-btn.correct { background: #d7ffb8; border-color: #58cc02; color: #58a700; box-shadow: 0 4px 0 #58a700; }
    .option-btn.wrong { background: #ffdfe0; border-color: #ea2b2b; color: #ea2b2b; box-shadow: 0 4px 0 #ea2b2b; }

    /* Mode Escriure */
    .text-input {
      width: 100%; padding: 18px; border: 2px solid #e5e5e5; border-radius: 15px;
      font-size: 1.2rem; font-weight: bold; box-sizing: border-box; color: #3c3c3c;
    }
    .text-input:focus { outline: none; border-color: #1cb0f6; background: #ddf4ff; }
    .text-input.correct { background: #d7ffb8; border-color: #58cc02; color: #58a700; }
    .text-input.wrong { background: #ffdfe0; border-color: #ea2b2b; color: #ea2b2b; }

    /* Mode Ordenar */
    .order-area { display: flex; flex-wrap: wrap; gap: 10px; min-height: 60px; padding: 15px; border-radius: 15px; }
    .order-area.target { border: 2px dashed #afafaf; margin-bottom: 15px; background: #f7f9fa; transition: background 0.2s; }
    .order-area.source { border: 2px solid transparent; }
    .fragment-btn {
      background: #ffffff; border: 2px solid #e5e5e5; border-radius: 10px; padding: 10px 15px;
      font-size: 1rem; font-weight: bold; cursor: pointer; color: #4b4b4b; box-shadow: 0 2px 0 rgba(0,0,0,0.05);
      transition: transform 0.1s;
    }
    .fragment-btn:hover { background: #f0f0f0; transform: scale(1.02); }

    /* Peu de pàgina */
    .footer { border-top: 2px solid #e5e5e5; padding: 20px 0; margin-top: auto; }
    #action-btn {
      width: 100%; background: #e5e5e5; color: #afafaf; border: none; border-radius: 15px;
      padding: 16px; font-size: 1.2rem; font-weight: bold; text-transform: uppercase; cursor: not-allowed;
      box-shadow: 0 4px 0 #afafaf; transition: all 0.1s;
    }
    #action-btn.active { background: #58cc02; color: white; cursor: pointer; box-shadow: 0 4px 0 #58a700; }
    #action-btn.active:active { transform: translateY(4px); box-shadow: 0 0 0 #58a700; }
    #action-btn.wrong-state { background: #ea2b2b; box-shadow: 0 4px 0 #c11f1f; color: white; }

    /* Històric de Resultats amb Desplegables */
    #history-container {
      margin-top: 20px;
      text-align: left;
      background: #f7f9fa;
      border: 2px solid #e5e5e5;
      border-radius: 15px;
      padding: 15px;
      max-height: 250px;
      overflow-y: auto;
    }
    .history-title { font-size: 1.1rem; font-weight: bold; color: #afafaf; margin-bottom: 10px; text-transform: uppercase; }
    
    .history-item { border-bottom: 2px solid #e5e5e5; margin-bottom: 5px; }
    .history-item:last-child { border-bottom: none; margin-bottom: 0; }
    
    .history-summary {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; font-size: 1.1rem; color: #4b4b4b; cursor: pointer;
      list-style: none; /* Amaga la fletxeta per defecte del navegador */
    }
    .history-summary::-webkit-details-marker { display: none; }
    .history-summary:hover { color: #1cb0f6; }
    
    .history-definition {
      padding: 12px; margin-bottom: 12px;
      background: #ffffff; border-radius: 10px; border: 1px solid #e5e5e5;
      font-size: 1rem; color: #555; line-height: 1.4;
    }

    .perc-high { color: #58cc02; font-weight: bold; }
    .perc-mid { color: #ff9600; font-weight: bold; }
    .perc-low { color: #ea2b2b; font-weight: bold; }

    /* Animació d'error */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
    
    .hidden { display: none !important; }
    #result-area { text-align: center; margin-top: 20px; flex-grow: 1; display: flex; flex-direction: column; }
    #result-area h1 { font-size: 2.2rem; margin-bottom: 5px; }
    .streak-final { color: #ff9600; font-weight: bold; font-size: 1.4rem; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; gap: 5px; }
  </style>
</head>

  </div>

    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();

    function playSound(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      
      if (type === 'correct') {
        osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, now); osc.frequency.setValueAtTime(659.25, now + 0.1); 
        gainNode.gain.setValueAtTime(0.5, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
      } else if (type === 'wrong') {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.setValueAtTime(100, now + 0.15);
        gainNode.gain.setValueAtTime(0.5, now); gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
      } else if (type === 'win') {
        osc.type = 'square'; osc.frequency.setValueAtTime(261.63, now); osc.frequency.setValueAtTime(329.63, now + 0.15);
        osc.frequency.setValueAtTime(392.00, now + 0.3); osc.frequency.setValueAtTime(523.25, now + 0.45);
        gainNode.gain.setValueAtTime(0.3, now); gainNode.gain.linearRampToValueAtTime(0, now + 0.8);
        osc.start(now); osc.stop(now + 0.8);
      } else if (type === 'lose') {
        osc.type = 'triangle'; osc.frequency.setValueAtTime(329.63, now); osc.frequency.setValueAtTime(293.66, now + 0.2);
        osc.frequency.setValueAtTime(261.63, now + 0.4); osc.frequency.setValueAtTime(246.94, now + 0.6);
        gainNode.gain.setValueAtTime(0.5, now); gainNode.gain.linearRampToValueAtTime(0, now + 1);
        osc.start(now); osc.stop(now + 1);
      }
    }

    function checkStreak() {
      const lastWinDate = localStorage.getItem('ecolingo_last_win');
      const today = new Date().toDateString();
      let streak = parseInt(localStorage.getItem('ecolingo_streak')) || 0;
      if (lastWinDate) {
        const diffDays = Math.ceil(Math.abs(new Date(today) - new Date(lastWinDate)) / (1000 * 60 * 60 * 24));
        if (diffDays > 1) { streak = 0; localStorage.setItem('ecolingo_streak', streak); }
      }
      return streak;
    }

    function updateStreakOnWin() {
      const lastWinDate = localStorage.getItem('ecolingo_last_win');
      const today = new Date().toDateString();
      let streak = parseInt(localStorage.getItem('ecolingo_streak')) || 0;
      if (lastWinDate !== today) {
        streak++; 
        localStorage.setItem('ecolingo_streak', streak); 
        localStorage.setItem('ecolingo_last_win', today);
      }
      return streak;
    }

    function updateConceptStats(terme, isCorrect) {
      let stats = JSON.parse(localStorage.getItem('ecolingo_concept_stats')) || {};
      if (!stats[terme]) { stats[terme] = { total: 0, correct: 0 }; }
      stats[terme].total++;
      if (isCorrect) stats[terme].correct++;
      localStorage.setItem('ecolingo_concept_stats', JSON.stringify(stats));
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function updateProgress() {
      progressBar.style.width = `${(currentQuestionCount / totalQuestions) * 100}%`;
    }

    // =====================================================================
    // GENERACIÓ DE PREGUNTES
    // =====================================================================
    function generateQuestion() {
      // Prevenció d'errors si la bbdd està buida
      if (!db || db.length === 0) {
        questionInstruction.textContent = "Error";
        questionContent.textContent = "La base de dades (db) està buida. Afegeix conceptes!";
        return;
      }

      optionsContainer.innerHTML = '';
      feedbackMsg.style.display = 'none';
      questionState = 'answering';
      selectedButton = null;
      gameWrapper.classList.remove('shake');
      
      actionBtn.disabled = true;
      actionBtn.textContent = 'Comprova';
      actionBtn.className = '';
      actionBtn.onclick = checkAnswer;

      currentConcept = db[Math.floor(Math.random() * db.length)];
      const modes = ['multiple-choice', 'true-false', 'write', 'order', 'fill-blank'];
      currentMode = modes[Math.floor(Math.random() * modes.length)];

      if (currentMode === 'multiple-choice') {
        questionInstruction.textContent = "A quin concepte correspon aquesta definició?";
        questionContent.textContent = `"${currentConcept.definicio_correcta}"`;
        currentCorrectAnswer = currentConcept.terme;
        const falsos = db.filter(c => c.terme !== currentConcept.terme).sort(() => 0.5 - Math.random()).slice(0, 2);
        renderOptions(shuffle([currentConcept.terme, falsos[0].terme, falsos[1].terme]));
      } 
      else if (currentMode === 'true-false') {
        const isTrue = Math.random() > 0.5;
        let defToShow = currentConcept.definicio_correcta;
        if (!isTrue) {
          const fakeConcept = db.filter(c => c.terme !== currentConcept.terme)[Math.floor(Math.random() * (db.length - 1))];
          defToShow = fakeConcept.definicio_correcta;
        }
        questionInstruction.textContent = "Vertader o Fals?";
        questionContent.textContent = `La definició de "${currentConcept.terme}" és: "${defToShow}"`;
        currentCorrectAnswer = isTrue ? 'Vertader' : 'Fals';
        renderOptions(['Vertader', 'Fals']);
      }
      else if (currentMode === 'write') {
        questionInstruction.textContent = "Escriu el concepte que correspon a aquesta definició:";
        questionContent.textContent = `"${currentConcept.definicio_correcta}"`;
        currentCorrectAnswer = currentConcept.terme.toLowerCase();
        const input = document.createElement('input');
        input.type = 'text'; input.id = 'write-input'; input.className = 'text-input';
        input.placeholder = 'Escriu el terme aquí...'; input.autocomplete = 'off';
        input.addEventListener('input', (e) => {
          if(e.target.value.trim().length > 0) { actionBtn.disabled = false; actionBtn.classList.add('active'); } 
          else { actionBtn.disabled = true; actionBtn.classList.remove('active'); }
        });
        optionsContainer.appendChild(input);
        setTimeout(() => input.focus(), 100);
      }
      else if (currentMode === 'order') {
        questionInstruction.textContent = "Ordena els fragments per formar la definició de:";
        questionContent.textContent = `"${currentConcept.terme}"`;
        currentCorrectAnswer = currentConcept.fragments_definicio.join(' ');
        
        const targetArea = document.createElement('div'); targetArea.className = 'order-area target'; targetArea.id = 'target-area';
        const sourceArea = document.createElement('div'); sourceArea.className = 'order-area source'; sourceArea.id = 'source-area';
        
        optionsContainer.appendChild(targetArea);
        optionsContainer.appendChild(sourceArea);

        let fragments = shuffle([...currentConcept.fragments_definicio]);
        fragments.forEach(frag => {
          const btn = document.createElement('div');
          btn.className = 'fragment-btn'; btn.textContent = frag;
          btn.onclick = () => {
            if (questionState !== 'answering') return;
            if (btn.parentElement.id === 'source-area') { targetArea.appendChild(btn); } else { sourceArea.appendChild(btn); }
            if (sourceArea.children.length === 0) { actionBtn.disabled = false; actionBtn.classList.add('active'); } 
            else { actionBtn.disabled = true; actionBtn.classList.remove('active'); }
          };
          sourceArea.appendChild(btn);
        });
      }
      else if (currentMode === 'fill-blank') {
        const hideWord = currentConcept.fragments_definicio[Math.floor(Math.random() * currentConcept.fragments_definicio.length)];
        const modifiedDef = currentConcept.definicio_correcta.replace(hideWord, "________");
        questionInstruction.textContent = `Completa la definició de "${currentConcept.terme}":`;
        questionContent.textContent = `"${modifiedDef}"`;
        currentCorrectAnswer = hideWord;
        const fake1 = db[Math.floor(Math.random() * db.length)].fragments_definicio[0] || "un impost indirecte";
        const fake2 = db[Math.floor(Math.random() * db.length)].fragments_definicio[1] || "dels mercats financers";
        renderOptions(shuffle([hideWord, fake1, fake2]));
      }
    }

    function renderOptions(opts) {
      opts.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn'; btn.textContent = opt;
        btn.onclick = () => selectOption(btn);
        optionsContainer.appendChild(btn);
      });
    }

    function selectOption(btn) {
      if (questionState !== 'answering') return;
      const allBtns = document.querySelectorAll('.option-btn');
      allBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedButton = btn;
      actionBtn.disabled = false;
      actionBtn.classList.add('active');
    }

    // =====================================================================
    // VALIDACIÓ
    // =====================================================================
    function checkAnswer() {
      questionState = 'checking';
      let isCorrect = false;

      if (currentMode === 'multiple-choice' || currentMode === 'true-false' || currentMode === 'fill-blank') {
        isCorrect = (selectedButton.textContent === currentCorrectAnswer);
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => {
          b.onclick = null; 
          if (b.textContent === currentCorrectAnswer) b.classList.add('correct');
        });
        if (!isCorrect) selectedButton.classList.add('wrong');
      } 
      else if (currentMode === 'write') {
        const input = document.getElementById('write-input');
        input.disabled = true;
        isCorrect = (input.value.trim().toLowerCase() === currentCorrectAnswer);
        if (isCorrect) input.classList.add('correct');
        else {
          input.classList.add('wrong');
          feedbackMsg.style.display = 'block'; feedbackMsg.style.color = '#ea2b2b';
          feedbackMsg.textContent = `La resposta correcta era: ${currentConcept.terme}`;
        }
      }
      else if (currentMode === 'order') {
        const targetArea = document.getElementById('target-area');
        const userOrder = Array.from(targetArea.children).map(b => b.textContent).join(' ');
        isCorrect = (userOrder === currentCorrectAnswer);
        Array.from(targetArea.children).forEach(b => {
          b.style.borderColor = isCorrect ? '#58cc02' : '#ea2b2b';
          b.style.background = isCorrect ? '#d7ffb8' : '#ffdfe0';
        });
        if (!isCorrect) {
          feedbackMsg.style.display = 'block'; feedbackMsg.style.color = '#ea2b2b';
          feedbackMsg.textContent = `La resposta correcta era: ${currentConcept.definicio_correcta}`;
        }
      }

      gameHistory.push(currentConcept.terme);
      updateConceptStats(currentConcept.terme, isCorrect);

      if (isCorrect) {
        playSound('correct'); currentQuestionCount++; updateProgress(); actionBtn.textContent = 'Continua';
      } else {
        playSound('wrong'); gameWrapper.classList.add('shake'); lives--; livesCount.textContent = lives;
        actionBtn.textContent = 'Continua'; actionBtn.classList.add('wrong-state');
      }

      actionBtn.onclick = nextStep;
    }

    function nextStep() {
      if (lives <= 0) endGame(false);
      else if (currentQuestionCount >= totalQuestions) endGame(true);
      else generateQuestion();
    }

    // =====================================================================
    // FINAL DE PARTIDA I RENDER
    // =====================================================================
    function endGame(win) {
      questionArea.classList.add('hidden'); gameHeader.classList.add('hidden'); gameFooter.classList.add('hidden');
      resultArea.classList.remove('hidden');
      
      let finalStreak = 0;
      if (win) {
        playSound('win'); 
        finalStreak = updateStreakOnWin();
        document.getElementById('result-title').textContent = '🎉 Lliçó Superada!';
        document.getElementById('result-title').style.color = '#58cc02';
        document.getElementById('result-msg').textContent = `Molt bona feina completant la lliçó.`;
      } else {
        playSound('lose');
        finalStreak = checkStreak();
        document.getElementById('result-title').textContent = '💔 Sense Vides';
        document.getElementById('result-title').style.color = '#ea2b2b';
        document.getElementById('result-msg').textContent = 'Repassa els conceptes fallats i torna-ho a intentar.';
      }

      document.getElementById('final-streak-count').textContent = finalStreak;

      // Calcular l'històric d'aquesta sessió
      let allStats = JSON.parse(localStorage.getItem('ecolingo_concept_stats')) || {};
      let uniqueSessionConcepts = [...new Set(gameHistory)];
      
      let historyData = uniqueSessionConcepts.map(terme => {
        let stat = allStats[terme];
        let percent = stat ? Math.round((stat.correct / stat.total) * 100) : 0;
        return { terme, percent };
      });

      historyData.sort((a, b) => b.percent - a.percent);

      // Render de l'històric amb detalls desplegables
      historyList.innerHTML = '';
      historyData.forEach(item => {
        const details = document.createElement('details');
        details.className = 'history-item';
        
        // Busquem la definició del concepte per mostrar-la
        const conceptData = db.find(c => c.terme === item.terme);
        const definitionText = conceptData ? conceptData.definicio_correcta : "Definició no disponible.";
        
        let colorClass = item.percent >= 80 ? 'perc-high' : (item.percent >= 50 ? 'perc-mid' : 'perc-low');
        
        details.innerHTML = `
          <summary class="history-summary">
            <span><strong>${item.terme}</strong> ▾</span>
            <span class="${colorClass}">${item.percent}% d'encert</span>
          </summary>
          <div class="history-definition">${definitionText}</div>
        `;
        historyList.appendChild(details);
      });
    }

    function resetGame() {
      // Prevenció d'errors si la bbdd està buida
      if (!db || db.length === 0) return;

      currentQuestionCount = 0;
      lives = 3;
      livesCount.textContent = lives;
      gameHistory = [];
      updateProgress();
      
      resultArea.classList.add('hidden');
      questionArea.classList.remove('hidden');
      gameHeader.classList.remove('hidden');
      gameFooter.classList.remove('hidden');
      
      generateQuestion();
    }

    window.onload = () => {
      checkStreak();
      // Vinculem el botó de reiniciar directament per codi
      document.getElementById('restart-btn').addEventListener('click', resetGame);
      generateQuestion();
    };
  </script>
</body>
